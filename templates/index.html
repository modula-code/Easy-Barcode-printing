<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Easy Barcode Printing</title>
        <style>
            :root {
                color-scheme: light;
                --ink: #4f372f;
                --muted: #6b4b41;
                --line: #d8c8c1;
                --surface: #fffdfb;
                --page: #f1e6dd;
                --primary: #4f372f;
                --primary-hover: #6b4b41;
                --accent: #6b4b41;
                --soft-accent: #f3e9e4;
                --success-bg: #f7efeb;
                --success-line: #cfb9af;
                --error-bg: #fff1f1;
                --error-line: #dba6a6;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                background: var(--page);
                color: var(--ink);
                font-family:
                    Inter,
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
            }

            main {
                width: min(720px, calc(100% - 20px));
                margin: 24px auto;
            }

            .panel {
                background: var(--surface);
                border: 1px solid var(--line);
                border-radius: 8px;
                box-shadow: 0 8px 24px rgba(79, 55, 47, 0.1);
                padding: clamp(18px, 4vw, 30px);
            }

            .brand {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 24px;
                margin-bottom: 14px;
                padding-bottom: 16px;
                border-bottom: 1px solid var(--line);
            }

            .brand-logo {
                display: block;
                width: min(270px, 48%);
                height: auto;
            }

            h1 {
                margin: 0;
                font-size: clamp(1.5rem, 4vw, 2rem);
                letter-spacing: 0;
                color: var(--ink);
            }

            .intro {
                margin: 0 0 22px;
                color: var(--muted);
                line-height: 1.55;
            }

            .form-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }

            .field:first-child,
            .field.full-width {
                grid-column: 1 / -1;
            }

            label {
                display: block;
                margin-bottom: 7px;
                font-size: 1rem;
                font-weight: 700;
            }

            input {
                width: 100%;
                min-height: 56px;
                padding: 12px 14px;
                border: 1px solid var(--line);
                border-radius: 9px;
                color: var(--ink);
                background: var(--surface);
                font: inherit;
                transition:
                    border-color 120ms ease,
                    box-shadow 120ms ease;
            }

            input:not([type="file"]) {
                text-transform: uppercase;
            }

            input[type="file"] {
                padding: 9px 12px;
                color: var(--muted);
            }

            input[type="file"]::file-selector-button {
                margin-right: 12px;
                padding: 7px 11px;
                border: 1px solid var(--line);
                border-radius: 7px;
                background: var(--soft-accent);
                color: var(--ink);
                cursor: pointer;
                font: inherit;
                font-weight: 650;
            }

            input:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(107, 75, 65, 0.18);
            }

            .hint {
                display: block;
                margin-top: 6px;
                color: var(--muted);
                font-size: 0.78rem;
            }

            button {
                width: 100%;
                min-height: 56px;
                margin-top: 14px;
                border: 0;
                border-radius: 9px;
                background: var(--primary);
                color: #fff;
                cursor: pointer;
                font: inherit;
                font-weight: 750;
                transition:
                    background 120ms ease,
                    transform 120ms ease;
            }

            button:hover {
                background: var(--primary-hover);
            }
            button:active {
                transform: translateY(1px);
            }
            button:disabled {
                cursor: not-allowed;
                opacity: 0.58;
            }

            button.secondary {
                width: 100%;
                min-height: 44px;
                margin-top: 10px;
                padding: 0 18px;
                border: 1px solid var(--line);
                background: var(--soft-accent);
                color: var(--ink);
            }

            button.secondary:hover {
                background: var(--line);
            }

            #message {
                margin-top: 22px;
                padding: 13px 15px;
                border: 1px solid var(--error-line);
                border-radius: 9px;
                background: var(--error-bg);
                color: #8c2626;
            }

            #results {
                display: grid;
                gap: 14px;
                margin-top: 24px;
            }

            .result-card {
                border: 1px solid var(--line);
                border-radius: 8px;
                overflow: hidden;
            }

            .result-heading {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                padding: 12px 15px;
                border-bottom: 1px solid var(--line);
                background: var(--soft-accent);
            }

            .result-heading strong {
                letter-spacing: 0.02em;
            }

            .badge {
                border-radius: 999px;
                padding: 4px 9px;
                background: var(--accent);
                color: #fff;
                font-size: 0.75rem;
                font-weight: 750;
            }

            .match {
                display: grid;
                grid-template-columns: minmax(150px, 0.8fr) 1.2fr;
                gap: 8px 18px;
                padding: 15px;
                background: var(--success-bg);
            }

            .match + .match {
                border-top: 1px solid var(--success-line);
            }

            .part-code {
                align-self: center;
                font-size: 1.25rem;
                font-weight: 800;
                word-break: break-word;
            }

            .metadata {
                color: var(--muted);
                font-size: 1rem;
                line-height: 1.55;
            }

            .result-error {
                margin: 0;
                padding: 15px;
                background: var(--error-bg);
                color: #8c2626;
                line-height: 1.45;
            }

            .document-status {
                padding: 12px 15px;
                border-top: 1px solid var(--success-line);
                background: var(--surface);
                color: var(--muted);
                font-size: 0.86rem;
            }

            .print-link {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 52px;
                margin-top: 10px;
                padding: 8px 13px;
                border-radius: 8px;
                background: var(--primary);
                color: #fff;
                text-decoration: none;
                font-weight: 750;
            }

            .print-link:hover {
                background: var(--primary-hover);
            }

            .secondary-print-link {
                margin-left: 8px;
                background: var(--accent);
            }

            .secondary-print-link:hover {
                background: var(--primary);
            }

            .top-link {
                display: inline-flex;
                align-items: center;
                min-height: 44px;
                padding: 0 14px;
                border: 1px solid var(--line);
                border-radius: 7px;
                background: var(--soft-accent);
                color: var(--primary);
                font-weight: 750;
                text-decoration: none;
                white-space: nowrap;
            }

            .top-link:hover {
                background: var(--line);
                text-decoration: underline;
            }

            #message.ok {
                border-color: var(--success-line);
                background: var(--success-bg);
                color: var(--ink);
            }

            [hidden] {
                display: none !important;
            }

            @media (max-width: 580px) {
                main {
                    margin: 24px auto;
                }
                .form-grid,
                .match {
                    grid-template-columns: 1fr;
                }
                .field:first-child,
                .field.full-width {
                    grid-column: auto;
                }
                .brand {
                    align-items: flex-start;
                    flex-direction: column;
                }
                .brand-logo {
                    width: min(280px, 100%);
                }
                .print-link {
                    width: 100%;
                }
                .secondary-print-link {
                    margin-left: 0;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <section class="panel">
                <header class="brand">
                    <img
                        class="brand-logo"
                        src="{{ url_for('static', filename='logo.svg') }}"
                        alt="Modula SW Enterprise"
                    />
                    <h1>Label Printing</h1>
                    <a
                        class="top-link"
                        href="{{ url_for('queue_page') }}"
                        target="_blank"
                        rel="noopener"
                        >Queue</a
                    >
                </header>
                <p class="intro">
                    Scan or enter the PO and SM codes. Planner assigns production by SO priority.
                </p>

                <form id="lookup-form">
                    <div class="form-grid">
                        <div class="field">
                            <label for="po-number">PO number</label>
                            <input
                                id="po-number"
                                name="po_number"
                                type="text"
                                placeholder="09862 or PO09862"
                                list="po-suggestions"
                                autocomplete="off"
                                autofocus
                                required
                            />
                            <datalist id="po-suggestions"></datalist>
                            <button
                                id="check-po-button"
                                class="secondary"
                                type="button"
                            >
                                Check PO
                            </button>
                            <span id="po-check-result" class="hint" hidden></span>
                            <span class="hint"
                                >Number only works, for example 09862.</span
                            >
                        </div>

                        <div class="field">
                            <label for="code-1">SM code 1</label>
                            <input
                                id="code-1"
                                name="code1"
                                type="text"
                                autocomplete="off"
                                autocapitalize="characters"
                            />
                        </div>

                        <div class="field">
                            <label for="code-2">SM code 2 (optional)</label>
                            <input
                                id="code-2"
                                name="code2"
                                type="text"
                                autocomplete="off"
                                autocapitalize="characters"
                            />
                        </div>

                        <div class="field full-width">
                            <label for="work-date">Work date</label>
                            <input
                                id="work-date"
                                name="work_date"
                                type="date"
                                required
                            />
                        </div>

                        <div class="field full-width">
                            <label for="document">Label PDF</label>
                            <input
                                id="document"
                                name="document"
                                type="file"
                                accept="application/pdf,.pdf"
                                required
                            />
                            <span class="hint">
                                Fetch from Odoo or choose a PDF.
                            </span>
                            <button
                                id="fetch-label-button"
                                class="secondary"
                                type="button"
                            >
                                Fetch Label PDF
                            </button>
                            <span
                                id="fetch-label-result"
                                class="hint"
                                hidden
                            ></span>
                        </div>
                    </div>

                    <button id="submit-button" type="submit">
                        Find label pages
                    </button>
                </form>

                <div id="message" role="alert" hidden></div>
                <section id="results" aria-live="polite" hidden></section>
            </section>
        </main>

        <script>
            const form = document.querySelector("#lookup-form");
            const button = document.querySelector("#submit-button");
            const message = document.querySelector("#message");
            const results = document.querySelector("#results");
            const checkPoButton = document.querySelector("#check-po-button");
            const poCheckResult = document.querySelector("#po-check-result");
            const poInput = document.querySelector("#po-number");
            const poSuggestions = document.querySelector("#po-suggestions");
            const documentInput = document.querySelector("#document");
            const fetchLabelButton = document.querySelector(
                "#fetch-label-button",
            );
            const fetchLabelResult = document.querySelector(
                "#fetch-label-result",
            );
            const fetchLabelButtonText = fetchLabelButton.textContent.trim();
            const submitButtonText = button.textContent.trim();
            let fetchedLabelFile = null;
            let poSuggestionTimer = 0;
            let poSuggestionController = null;
            let resolvedPoNumber = "";

            function unlockFetchedLabel(text) {
                fetchedLabelFile = null;
                documentInput.required = true;
                fetchLabelButton.disabled = false;
                fetchLabelButton.textContent = fetchLabelButtonText;
                if (text) {
                    fetchLabelResult.hidden = false;
                    fetchLabelResult.textContent = text;
                }
            }

            async function loadPoSuggestions() {
                const query = poInput.value.trim().toUpperCase();
                poSuggestions.replaceChildren();
                if (query.length < 2) return;

                poSuggestionController?.abort();
                poSuggestionController = new AbortController();
                try {
                    const response = await fetch(
                        `/api/po-suggestions?q=${encodeURIComponent(query)}`,
                        { signal: poSuggestionController.signal },
                    );
                    if (!response.ok) return;
                    const data = await response.json();
                    for (const suggestion of data.suggestions || []) {
                        const option = document.createElement("option");
                        option.value = suggestion.po_number;
                        option.label = suggestion.partner_ref
                            ? `partner_ref: ${suggestion.partner_ref}`
                            : "Purchase order";
                        poSuggestions.appendChild(option);
                    }
                } catch (error) {
                    if (error.name !== "AbortError") {
                        poSuggestions.replaceChildren();
                    }
                }
            }

            fetchLabelButton.addEventListener("click", async () => {
                const poNumber = poInput.value.trim().toUpperCase();
                if (!poNumber) {
                    fetchLabelResult.hidden = false;
                    fetchLabelResult.textContent = "Enter a PO number first.";
                    return;
                }

                fetchLabelButton.disabled = true;
                fetchLabelResult.hidden = false;
                fetchLabelResult.textContent = "Fetching Panel Label…";
                try {
                    const response = await fetch(
                        `/api/panel-label?po_number=${encodeURIComponent(poNumber)}`,
                    );
                    if (!response.ok) {
                        const data = await response.json();
                        throw new Error(data.error || "Fetch failed.");
                    }
                    const blob = await response.blob();
                    fetchedLabelFile = new File(
                        [blob],
                        `panel-label-${poNumber.replace(/\//g, "-")}.pdf`,
                        { type: "application/pdf" },
                    );
                    documentInput.required = false;
                    documentInput.value = "";
                    fetchLabelResult.textContent = "Label PDF fetched and locked.";
                    fetchLabelButton.textContent = "Label PDF fetched";
                } catch (error) {
                    unlockFetchedLabel();
                    fetchLabelResult.textContent =
                        error.message || "Fetch failed.";
                } finally {
                    if (!fetchedLabelFile) {
                        fetchLabelButton.disabled = false;
                        fetchLabelButton.textContent = fetchLabelButtonText;
                    }
                }
            });

            // Barcode scanner support: scanners type very fast and finish
            // with Enter. Fast bursts fill SM Code 1, then SM Code 2, then
            // alternate 1 -> 2 -> 1 so the newest two scans are kept.
            const code1Input = document.querySelector("#code-1");
            const code2Input = document.querySelector("#code-2");
            const workDateInput = document.querySelector("#work-date");

            // Keep typed fields across navigation/reloads. The PDF and
            // lookup results cannot be restored; fetch and search again.
            const FIELDS_KEY = "barcode-print-fields";

            function saveFields() {
                localStorage.setItem(
                    FIELDS_KEY,
                    JSON.stringify({
                        po: poInput.value,
                        code1: code1Input.value,
                        code2: code2Input.value,
                    }),
                );
            }

            try {
                const saved =
                    JSON.parse(localStorage.getItem(FIELDS_KEY)) || {};
                poInput.value ||= saved.po || "";
                code1Input.value ||= saved.code1 || "";
                code2Input.value ||= saved.code2 || "";
            } catch {
                localStorage.removeItem(FIELDS_KEY);
            }

            code1Input.addEventListener("input", saveFields);
            code2Input.addEventListener("input", saveFields);
            let scanBuffer = "";
            let scanLastKeyAt = 0;
            let scanFocusTarget = null;
            let scanFocusValue = "";
            let scanOverrideSlot = 0;

            // Mirrors normalize_sm_code() in odoo_client.py. Labels carry a
            // bare "B313-AD", so "SM-" is always added. Idempotent: this runs
            // on scan and again on submit.
            function normalizeSmCode(value) {
                let parts = String(value || "")
                    .toUpperCase()
                    .split("-")
                    .map((part) => part.trim());
                if (parts[0] === "SM") parts = parts.slice(1);
                parts = parts.filter(Boolean);
                if (!parts.length) return "";
                if (parts.length !== 2) return `SM-${parts.join("-")}`;

                const isMainCode = (part) =>
                    /^\d+$/.test(part) || /^[A-Z]\d+$/.test(part);
                let [first, second] = parts;
                if (isMainCode(second) && /^[A-Z]{2}$/.test(first)) {
                    [first, second] = [second, first];
                }
                return `SM-${first}-${second}`;
            }

            function fillScannedCode(code) {
                code = normalizeSmCode(code);
                if (!code1Input.value) {
                    code1Input.value = code;
                    scanOverrideSlot = 0;
                } else if (!code2Input.value) {
                    code2Input.value = code;
                    scanOverrideSlot = 0;
                } else {
                    [code1Input, code2Input][scanOverrideSlot].value = code;
                    scanOverrideSlot = 1 - scanOverrideSlot;
                }
                saveFields();
            }

            document.addEventListener("keydown", (event) => {
                const now = Date.now();
                if (now - scanLastKeyAt > 50) {
                    scanBuffer = "";
                    scanFocusTarget = document.activeElement;
                    scanFocusValue =
                        scanFocusTarget && "value" in scanFocusTarget
                            ? scanFocusTarget.value
                            : "";
                }
                scanLastKeyAt = now;
                if (event.key === "Enter") {
                    if (scanBuffer.length >= 4) {
                        event.preventDefault();
                        // undo scan characters typed into a focused input
                        if (
                            scanFocusTarget &&
                            "value" in scanFocusTarget
                        ) {
                            scanFocusTarget.value = scanFocusValue;
                        }
                        fillScannedCode(scanBuffer.trim().toUpperCase());
                    }
                    scanBuffer = "";
                    return;
                }
                if (event.key.length === 1) {
                    scanBuffer += event.key;
                }
            });

            poInput.addEventListener("input", () => {
                saveFields();
                if (fetchedLabelFile) {
                    unlockFetchedLabel("PO changed. Fetch the label PDF again.");
                }
                clearTimeout(poSuggestionTimer);
                poSuggestionTimer = setTimeout(loadPoSuggestions, 200);
            });

            documentInput.addEventListener("change", () => {
                if (documentInput.files.length) {
                    unlockFetchedLabel("Using uploaded PDF.");
                }
            });

            checkPoButton.addEventListener("click", async () => {
                const poNumber = document
                    .querySelector("#po-number")
                    .value.trim()
                    .toUpperCase();
                if (!poNumber) {
                    poCheckResult.hidden = false;
                    poCheckResult.textContent = "Enter a PO number first.";
                    return;
                }

                checkPoButton.disabled = true;
                poCheckResult.hidden = false;
                poCheckResult.textContent = "Checking…";
                try {
                    const response = await fetch(
                        `/api/partner-ref?po_number=${encodeURIComponent(poNumber)}`,
                    );
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(data.error || "Lookup failed.");
                    }
                    poCheckResult.textContent = `${data.po_number}: PO found`;
                } catch (error) {
                    poCheckResult.textContent = error.message || "Lookup failed.";
                } finally {
                    checkPoButton.disabled = false;
                }
            });

            function clearOutput() {
                message.hidden = true;
                message.textContent = "";
                message.className = "";
                results.hidden = true;
                results.replaceChildren();
            }

            function addText(parent, className, text) {
                const element = document.createElement("div");
                element.className = className;
                element.textContent = text;
                parent.appendChild(element);
                return element;
            }

            function showMessage(text, isError = false) {
                message.textContent = text;
                message.className = isError ? "" : "ok";
                message.hidden = false;
            }

            function newEventId() {
                if (globalThis.crypto?.randomUUID) return globalThis.crypto.randomUUID();
                return `event-${Date.now()}-${Math.random().toString(16).slice(2)}`;
            }

            async function addPrintedPartToQueue(match, quantity, eventId) {
                if (!resolvedPoNumber) {
                    throw new Error("Enter a PO before production can sync.");
                }
                const response = await fetch("/api/print-queue", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
<<<<<<< HEAD
                        event_id: eventId,
                        po_number: resolvedPoNumber,
=======
>>>>>>> parent of bd6fa16 (added history page)
                        part_code: match.part_code,
                        quantity,
                        work_date: workDateInput.value,
                    }),
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || "Could not sync production.");
                }
                return data;
            }

            function queuedPrintLink(match, href, quantity, text, secondary = false) {
                const link = document.createElement("a");
                link.className = secondary
                    ? "print-link secondary-print-link"
                    : "print-link";
                link.href = href;
                link.target = "_blank";
                link.rel = "noopener";
                link.textContent = text;
                link.addEventListener("click", async (event) => {
                    event.preventDefault();
                    if (!workDateInput.reportValidity()) return;
                    const eventKey = `production-event:${workDateInput.value}:${resolvedPoNumber}:${match.part_code}:${quantity}`;
                    const eventId = sessionStorage.getItem(eventKey) || newEventId();
                    const printWindow = window.open("about:blank", "_blank");
                    if (printWindow) {
                        printWindow.opener = null;
                    }
                    try {
                        sessionStorage.setItem(eventKey, eventId);
                        const data = await addPrintedPartToQueue(match, quantity, eventId);
                        sessionStorage.removeItem(eventKey);
                        const associated = (data.sync?.associated || [])
                            .map((item) => `${item.code} x ${item.quantity}`)
                            .join(", ");
                        showMessage(
                            `Synced ${match.part_code} x ${quantity}${associated ? `; associated ${associated}` : ""}.`,
                        );
                        if (printWindow) {
                            printWindow.location = href;
                        } else {
                            window.open(href, "_blank", "noopener");
                        }
                    } catch (error) {
                        if (printWindow) {
                            printWindow.close();
                        }
                        showMessage(
                            error.message || "Could not sync production.",
                            true,
                        );
                    }
                });
                return link;
            }

            function renderResults(data) {
                resolvedPoNumber = String(data.po_number || "").trim().toUpperCase();
                if (resolvedPoNumber) poInput.value = resolvedPoNumber;
                results.replaceChildren();
                let renderedAny = false;

                for (const match of data.matches || []) {
                    const card = document.createElement("article");
                    card.className = "result-card";

                    const heading = document.createElement("header");
                    heading.className = "result-heading";
                    const code = document.createElement("strong");
                    code.textContent = match.sm_codes.join(", ");
                    const badge = document.createElement("span");
                    badge.className = "badge";
                    badge.textContent = "Match";
                    heading.append(code, badge);
                    card.appendChild(heading);

                    const row = document.createElement("div");
                    row.className = "match";
                    addText(row, "part-code", match.part_code);
                    const metadata = document.createElement("div");
                    metadata.className = "metadata";
                    metadata.textContent = match.product_template_name;
                    row.appendChild(metadata);
                    card.appendChild(row);

                    const documentStatus = document.createElement("div");
                    documentStatus.className = "document-status";
                    if (match.document_match?.found) {
                        const pageLabel =
                            match.document_match.matching_page_count === 1
                                ? "label page"
                                : "label pages";
                        documentStatus.append(
                            document.createTextNode(
                                `${match.document_match.matching_page_count} ${pageLabel}: ${match.document_match.page_numbers.join(", ")}.`,
                            ),
                            document.createElement("br"),
                        );
                        const printLink = queuedPrintLink(
                            match,
                            match.document_match.print_url,
                            1,
                            "Print and record 1",
                        );
                        documentStatus.append(printLink);

                        if (match.document_match.matching_page_count > 1) {
                            const printAllLink = queuedPrintLink(
                                match,
                                match.document_match.all_print_url,
                                match.document_match.matching_page_count,
                                `Print and record all quantity (${match.document_match.matching_page_count})`,
                                true,
                            );
                            documentStatus.append(printAllLink);
                        }
                    } else {
                        documentStatus.textContent = `Part code ${match.part_code} was not found in the uploaded PDF.`;
                    }
                    card.appendChild(documentStatus);

                    results.appendChild(card);
                    renderedAny = true;
                }

                const renderedErrors = new Set();
                for (const item of data.results || []) {
                    if (!item.error) continue;
                    const errorKey = `${item.sm_code}:${item.error}`;
                    if (renderedErrors.has(errorKey)) continue;
                    renderedErrors.add(errorKey);

                    const card = document.createElement("article");
                    card.className = "result-card";
                    const heading = document.createElement("header");
                    heading.className = "result-heading";
                    const headingCode = document.createElement("strong");
                    headingCode.textContent = item.sm_code;
                    heading.appendChild(headingCode);
                    card.appendChild(heading);
                    addText(card, "result-error", item.error);
                    results.appendChild(card);
                    renderedAny = true;
                }

                if (!renderedAny) {
                    const card = document.createElement("article");
                    card.className = "result-card";
                    addText(
                        card,
                        "result-error",
                        (data.results || []).length > 1
                            ? "No panel matches both SM codes."
                            : "No matching panel found.",
                    );
                    results.appendChild(card);
                }

                results.hidden = false;
            }

            form.addEventListener("submit", async (event) => {
                event.preventDefault();
                clearOutput();

                const formData = new FormData(form);
                const uploaded = formData.get("document");
                if ((!uploaded || !uploaded.size) && fetchedLabelFile) {
                    formData.set("document", fetchedLabelFile);
                }
                const code1 = normalizeSmCode(formData.get("code1"));
                const code2 = normalizeSmCode(formData.get("code2"));
                if (!code1 && !code2) {
                    showMessage("Enter at least one product code.", true);
                    return;
                }

                button.disabled = true;
                button.textContent = "Looking up…";
                formData.set(
                    "po_number",
                    formData.get("po_number").trim().toUpperCase(),
                );
                formData.set("code1", code1);
                formData.set("code2", code2);
                code1Input.value = code1;
                code2Input.value = code2;
                saveFields();

                try {
                    const response = await fetch("/api/lookup", {
                        method: "POST",
                        body: formData,
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(data.error || "Lookup failed.");
                    }
                    renderResults(data);
                } catch (error) {
                    showMessage(error.message || "Lookup failed.", true);
                } finally {
                    button.disabled = false;
                    button.textContent = submitButtonText;
                }
            });
        </script>
    </body>
</html>
