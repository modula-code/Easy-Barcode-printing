<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Barcode Queue</title>
        <style>
            :root {
                color-scheme: light;
                --ink: #4f372f;
                --muted: #6b4b41;
                --line: #d8c8c1;
                --surface: #fffdfb;
                --page: #f1e6dd;
                --soft: #f3e9e4;
                --error: #8c2626;
            }

            * { box-sizing: border-box; }

            body {
                margin: 0;
                min-height: 100vh;
                background: var(--page);
                color: var(--ink);
                font-family: Inter, ui-sans-serif, system-ui, sans-serif;
            }

            main {
                width: min(1050px, calc(100% - 24px));
                margin: 24px auto;
            }

            .panel {
                padding: clamp(18px, 4vw, 28px);
                border: 1px solid var(--line);
                border-radius: 10px;
                background: var(--surface);
                box-shadow: 0 8px 24px rgba(79, 55, 47, 0.1);
            }

            header,
            .toolbar,
            .actions {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            header {
                justify-content: space-between;
                margin-bottom: 18px;
            }

            h1 {
                margin: 0;
                font-size: clamp(1.5rem, 4vw, 2rem);
            }

            .date-box {
                display: grid;
                grid-template-columns: minmax(180px, 260px) 1fr;
                align-items: end;
                gap: 12px;
                margin-bottom: 16px;
                padding: 14px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--soft);
            }

            label {
                display: grid;
                gap: 6px;
                color: var(--muted);
                font-size: 0.82rem;
                font-weight: 700;
            }

            input,
            button,
            .export {
                min-height: 46px;
                border-radius: 8px;
                font: inherit;
            }

            input {
                width: 100%;
                padding: 10px 12px;
                border: 1px solid var(--line);
                background: #fff;
                color: var(--ink);
                font-size: 1rem;
            }

            input[type="text"] { text-transform: uppercase; }

            input:focus {
                outline: 3px solid rgba(107, 75, 65, 0.18);
                border-color: var(--ink);
            }

            input:disabled {
                background: var(--soft);
                opacity: 1;
            }

            button,
            .export {
                padding: 0 18px;
                border: 0;
                background: var(--ink);
                color: #fff;
                font-weight: 750;
                cursor: pointer;
            }

            .export {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                text-decoration: none;
                white-space: nowrap;
            }

            button:hover,
            .export:hover { background: var(--muted); }
            button:disabled { cursor: wait; opacity: 0.6; }

            button.remove {
                border: 1px solid #dba6a6;
                background: #fff1f1;
                color: var(--error);
            }

            #status {
                min-height: 1.4em;
                margin: 0 0 10px;
                color: var(--muted);
            }

            #status.error { color: var(--error); }
            #list { display: grid; gap: 10px; }

            .row {
                display: grid;
                grid-template-columns: minmax(150px, 0.8fr) minmax(180px, 1fr) 100px auto;
                align-items: end;
                gap: 10px;
                padding: 14px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--surface);
            }

            .empty {
                margin: 0;
                padding: 28px 14px;
                border: 1px dashed var(--line);
                border-radius: 8px;
                background: var(--soft);
                color: var(--muted);
                text-align: center;
            }

            [hidden] { display: none !important; }

            @media (max-width: 760px) {
                header,
                .date-box,
                .row {
                    display: grid;
                    grid-template-columns: 1fr;
                }

                .toolbar { display: grid; grid-template-columns: 1fr 1fr; }
                .toolbar > *,
                .actions button { width: 100%; }
                .actions { display: grid; grid-template-columns: 1fr 1fr; }
            }
        </style>
    </head>
    <body>
        <main>
            <section class="panel">
                <header>
                    <h1>Barcode Queue</h1>
                    <div class="toolbar">
                        <a class="export" href="/">Back to Label Printing</a>
                        <a class="export" href="/history">History</a>
                        <a id="export-link" class="export" href="#">Export XLSX</a>
                        <button id="clear-button" class="remove" type="button">
                            Clear today's queue
                        </button>
                    </div>
                </header>

                <div class="date-box">
                    <label>
                        Queue date
                        <input id="queue-date" type="date" />
                    </label>
                    <span id="date-note">Today’s shared queue</span>
                </div>

                <p id="status" aria-live="polite"></p>
                <div id="list" aria-live="polite"></div>
            </section>
        </main>

        <script>
            const list = document.querySelector("#list");
            const statusText = document.querySelector("#status");
            const dateInput = document.querySelector("#queue-date");
            const dateNote = document.querySelector("#date-note");
            const exportLink = document.querySelector("#export-link");
            const clearButton = document.querySelector("#clear-button");
            let queueData = null;

            function showStatus(message, error = false) {
                statusText.textContent = message;
                statusText.className = error ? "error" : "";
            }

            async function requestJson(url, options) {
                const response = await fetch(url, options);
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "Request failed.");
                return data;
            }

            function field(labelText, type, value, disabled) {
                const label = document.createElement("label");
                const caption = document.createElement("span");
                const input = document.createElement("input");
                caption.textContent = labelText;
                input.type = type;
                input.value = value || "";
                input.disabled = disabled;
                if (type === "number") {
                    input.min = "1";
                    input.max = "500";
                    input.step = "1";
                }
                label.append(caption, input);
                return { label, input };
            }

            function render(data) {
                queueData = data;
                list.replaceChildren();
                const archived = data.date !== data.today;
                dateInput.value = data.date;
                dateInput.max = data.today;
                dateNote.textContent = archived
                    ? "Archived queue — view and export only"
                    : "Today’s shared queue";
                clearButton.hidden = archived;
                exportLink.href = `/api/print-queue/export.xlsx?date=${encodeURIComponent(data.date)}`;

                if (!data.items.length) {
                    const empty = document.createElement("p");
                    empty.className = "empty";
                    empty.textContent = archived
                        ? "No archived barcodes for this date."
                        : "No barcodes scanned today.";
                    list.appendChild(empty);
                    return;
                }

                for (const item of data.items) {
                    const row = document.createElement("div");
                    row.className = "row";
                    const po = field("PO number", "text", item.po_number, archived);
                    const barcode = field("Barcode", "text", item.part_code, archived);
                    const quantity = field("Quantity", "number", item.quantity, archived);
                    row.append(po.label, barcode.label, quantity.label);

                    if (!archived) {
                        const actions = document.createElement("div");
                        const save = document.createElement("button");
                        const remove = document.createElement("button");
                        actions.className = "actions";
                        save.type = remove.type = "button";
                        save.textContent = "Save";
                        remove.textContent = "Remove";
                        remove.className = "remove";

                        save.addEventListener("click", async () => {
                            const nextPo = po.input.value.trim().toUpperCase();
                            const code = barcode.input.value.trim().toUpperCase();
                            const qty = Number(quantity.input.value);
                            if (!nextPo || !code || !Number.isInteger(qty) || qty < 1 || qty > 500) {
                                showStatus("Enter a PO, barcode, and quantity from 1 to 500.", true);
                                return;
                            }
                            save.disabled = true;
                            try {
                                await requestJson(`/api/print-queue/${item.id}`, {
                                    method: "PUT",
                                    headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify({ po_number: nextPo, part_code: code, quantity: qty }),
                                });
                                showStatus(`Saved ${nextPo} — ${code} x ${qty}.`);
                                await load(data.date);
                            } catch (error) {
                                showStatus(error.message, true);
                            } finally {
                                save.disabled = false;
                            }
                        });

                        remove.addEventListener("click", async () => {
                            if (!confirm(`Remove ${item.part_code} for ${item.po_number}?`)) return;
                            remove.disabled = true;
                            try {
                                await requestJson(`/api/print-queue/${item.id}`, { method: "DELETE" });
                                showStatus(`Removed ${item.part_code}.`);
                                await load(data.date);
                            } catch (error) {
                                showStatus(error.message, true);
                            } finally {
                                remove.disabled = false;
                            }
                        });
                        actions.append(save, remove);
                        row.appendChild(actions);
                    }
                    list.appendChild(row);
                }
            }

            async function load(selectedDate = "") {
                const query = selectedDate ? `?date=${encodeURIComponent(selectedDate)}` : "";
                render(await requestJson(`/api/print-queue${query}`));
            }

            dateInput.addEventListener("change", () => {
                history.replaceState(null, "", `?date=${encodeURIComponent(dateInput.value)}`);
                load(dateInput.value).catch((error) => showStatus(error.message, true));
            });

            clearButton.addEventListener("click", async () => {
                if (!confirm("Clear every barcode in today's queue? This cannot be undone.")) return;
                clearButton.disabled = true;
                try {
                    const data = await requestJson("/api/print-queue", { method: "DELETE" });
                    showStatus(`Cleared ${data.cleared} queue rows.`);
                    await load();
                } catch (error) {
                    showStatus(error.message, true);
                } finally {
                    clearButton.disabled = false;
                }
            });

            const initialDate = new URLSearchParams(location.search).get("date") || "";
            load(initialDate).catch((error) => showStatus(error.message, true));
        </script>
    </body>
</html>
